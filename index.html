<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>AI模型 Tokens 消耗数据库</title>
  <meta name="description" content="AI模型 Tokens 出海消耗周度看板" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 顶部品牌渐变线 -->
  <div class="brand-line"></div>

  <main class="container">

    <!-- ===== 顶部标题栏 ===== -->
    <header class="hero">
      <div class="hero-left">
        <div class="logo-mark">
          <span class="logo-dot"></span>
          <span class="logo-text">T</span>
        </div>
        <div class="hero-title">
          <h1 id="pageTitle">AI模型 Tokens 消耗数据库</h1>
          <p class="hero-sub" id="pageSub">研究团队</p>
        </div>
      </div>
      <div class="hero-right">
        <div class="fresh-tag" id="freshTag">
          <span class="pulse-dot"></span>
          <span id="freshText">每周更新 · 已最新</span>
        </div>
        <div class="hero-actions">
          <button id="exportBtn" class="export-btn" title="导出当前数据为 Excel">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            导出 Excel
          </button>
          <div class="period-tag" id="periodTag">数据周期 —</div>
        </div>
      </div>
    </header>

    <!-- ===== 本周总结 ===== -->
    <section class="summary-card reveal">
      <div class="section-label">本周总结</div>
      <div class="summary-body" id="summaryBody">
        <!-- JS 注入 -->
      </div>
    </section>

    <!-- ===== 3 个 KPI 卡片 ===== -->
    <section class="kpi-row reveal">
      <div class="kpi-card">
        <div class="kpi-label" id="kpi0Label">—</div>
        <div class="kpi-value" id="kpi0Value">—</div>
        <div class="kpi-trend" id="kpi0Trend">—</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label" id="kpi1Label">—</div>
        <div class="kpi-value accent" id="kpi1Value">—</div>
        <div class="kpi-trend" id="kpi1Trend">—</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label" id="kpi2Label">—</div>
        <div class="kpi-value" id="kpi2Value">—</div>
        <div class="kpi-trend" id="kpi2Trend">—</div>
      </div>
    </section>

    <!-- ===== 模块 1：总消耗曲线 ===== -->
    <section class="module reveal" id="module0">
      <div class="module-head">
        <div>
          <h2 class="module-title" id="m0Title">模块1</h2>
          <p class="module-comment" id="m0Comment">—</p>
        </div>
      </div>
      <div class="chart-wrap">
        <div id="chartTotal" class="chart" style="height:380px"></div>
      </div>
    </section>

    <!-- ===== 模块 2：前 10 排名 ===== -->
    <section class="module reveal" id="module1">
      <div class="module-head">
        <div>
          <h2 class="module-title" id="m1Title">模块2</h2>
          <p class="module-comment" id="m1Comment">—</p>
        </div>
      </div>
      <div class="rank-grid" id="rankGrid">
        <!-- JS 注入 10 张卡片 -->
      </div>
    </section>

    <!-- ===== 模块 3：国产份额 ===== -->
    <section class="module reveal" id="module2">
      <div class="module-head">
        <div>
          <h2 class="module-title" id="m2Title">模块3</h2>
          <p class="module-comment" id="m2Comment">—</p>
        </div>
      </div>
      <div class="chart-grid two">
        <div class="chart-wrap">
          <div id="chartDomTotal" class="chart" style="height:340px"></div>
        </div>
        <div class="chart-wrap">
          <div id="chartShare" class="chart" style="height:340px"></div>
        </div>
      </div>
    </section>

    <!-- ===== 模块 4：各国产模型明细 ===== -->
    <section class="module reveal" id="module3">
      <div class="module-head">
        <div>
          <h2 class="module-title" id="m3Title">模块4</h2>
          <p class="module-comment" id="m3Comment">—</p>
        </div>
      </div>
      <div class="chart-grid model-grid" id="modelGrid">
        <!-- JS 注入 7 个小图 -->
      </div>
    </section>

    <!-- ===== 页脚 ===== -->
    <footer class="footer">
      <div class="footer-line"></div>
      <div class="footer-text" id="footerText">—</div>
      <div class="footer-meta" id="genMeta">—</div>
    </footer>

  </main>

  <!-- 第三方库（全部本地化，避免国内 CDN 访问问题） -->
  <script src="vendor/firebase-app-compat.js"></script>
  <script src="vendor/firebase-database-compat.js"></script>
  <script src="vendor/firebase-auth-compat.js"></script>
  <script src="vendor/xlsx.full.min.js"></script>
  <script src="vendor/echarts.min.js"></script>

  <!-- 项目脚本（顺序重要：配置 → 数据层 → 业务） -->
  <script src="js/firebase-config.js"></script>
  <script src="js/models-config.js"></script>
  <script src="js/data-store.js"></script>
  <script src="js/export-excel.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
